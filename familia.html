<!doctype html><html lang="pt-BR"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Casa da família — JB / Gávea / Lagoa</title><style>
:root{--bg:#0f1419;--card:#1a2129;--bd:#2a333d;--tx:#e6edf3;--mut:#8b98a5;--ac:#4cc38a}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--tx);font:15px/1.55 -apple-system,Segoe UI,Roboto,sans-serif}
.wrap{max-width:980px;margin:0 auto;padding:24px}h1{font-size:23px;margin:0 0 4px}
.sub{color:var(--mut);font-size:13px;margin:0 0 16px}
.top{background:linear-gradient(135deg,#15323f,#1a2129);border:1px solid var(--ac);border-radius:12px;padding:16px 18px;margin-bottom:20px;position:relative}
.top .lab{color:var(--ac);font-size:12px;font-weight:700;letter-spacing:.05em}.top b{display:block;margin:6px 0;font-size:17px}
.top p{color:#cdd9e5;margin:6px 0;font-size:14px}.top .sc2{position:absolute;top:14px;right:16px;background:var(--ac);color:#06210f;font-weight:800;border-radius:10px;padding:6px 12px;font-size:18px}
.top a,.lk{color:var(--ac);text-decoration:none;font-size:13px}.top a:hover,.lk:hover{text-decoration:underline}
.filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
select{background:var(--card);color:var(--tx);border:1px solid var(--bd);border-radius:8px;padding:7px 9px;font-size:13px}
.card{background:var(--card);border:1px solid var(--bd);border-radius:12px;padding:16px;margin-bottom:14px}
.hd{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.sc{color:#06210f;font-weight:800;border-radius:9px;padding:5px 11px;font-size:16px;min-width:42px;text-align:center}
.ti{flex:1}.ti .pr{color:var(--mut);margin-left:8px;font-size:13px}.vd{font-weight:700;font-size:13px;text-transform:capitalize}
.tese{margin:4px 0 12px;font-size:14px;color:#cdd9e5}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px;font-size:13px;margin-bottom:10px}
.grid .k{display:block;color:var(--mut);font-size:11px;text-transform:uppercase;letter-spacing:.04em}
.pc{display:grid;grid-template-columns:1fr 1fr;gap:14px;font-size:13px;margin-bottom:8px}
.pc b{font-size:12px}.pro b{color:var(--ac)}.con b{color:#e3826b}.pc ul{margin:4px 0 0;padding-left:18px;color:#cdd9e5}
@media(max-width:640px){.grid,.pc{grid-template-columns:1fr}}
</style></head><body><div class="wrap">
<h1>A casa da família — Jardim Botânico · Gávea · Lagoa</h1>
<p class="sub">Análise de IA (fotos + ITBI/IPTU + condomínio) com fit para Roger, Ane (consultório) e Gael ·
0 imóveis avaliados · ordenados por fit · 2026-06-29</p>

<div class="filtros">
<select onchange="flt()" id="fv"><option value="">Todo veredito</option><option value="forte">Forte</option><option value="medio">Médio</option><option value="fraco">Fraco</option></select>
<select onchange="flt()" id="fb"><option value="">Todo bairro</option></select>
<select onchange="flt()" id="ft"><option value="">Todo tipo</option></select>
<select onchange="flt()" id="fo"><option value="">Área externa: tanto faz</option><option value="sim">Com área externa</option></select>
</div>

</div><script>
function flt(){var v=fv.value,b=fb.value,t=ft.value,o=fo.value;
document.querySelectorAll('.card').forEach(function(c){
var ok=(!v||c.dataset.ver.indexOf(v)>=0)&&(!b||c.dataset.bairro===b)&&(!t||c.dataset.tipo===t)&&(!o||c.dataset.out===o);
c.style.display=ok?'':'none';});}
</script></body></html>
